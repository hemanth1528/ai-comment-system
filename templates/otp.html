<!DOCTYPE html>
<html>

<head>

<title>OTP Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:
linear-gradient(
to top,
rgba(0,0,0,0.8),
rgba(0,0,0,0.5)
),

url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');

background-size:cover;
background-position:center;

height:100vh;

display:flex;
justify-content:center;
align-items:center;
}

.otp-box{

width:450px;

background:
rgba(0,0,0,0.85);

padding:40px;

border-radius:25px;

box-shadow:
0 0 35px rgba(255,0,0,0.25);
}

.logo{

color:red;

font-size:38px;

font-weight:bold;

margin-bottom:20px;

text-align:center;
}

.info{

text-align:center;

margin-bottom:25px;

font-size:18px;
}

input{

width:100%;

padding:15px;

margin-bottom:18px;

border:none;

border-radius:12px;

background:#222;

color:white;

font-size:16px;
}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:red;

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;
}

button:hover{

background:#ff2d2d;
}

</style>

</head>

<body>

<div class="otp-box">

<div class="logo">

AI STREAM

</div>

<div class="info">

OTP sent through {{method}}

</div>

<form method="POST">

<input
type="text"
name="otp"
placeholder="Enter OTP"
required>

<button type="submit">

Verify OTP

</button>

</form>

</div>

</body>

</html>
