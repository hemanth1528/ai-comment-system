<!DOCTYPE html>
<html>

<head>

<title>Downloads</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="navbar">

<div class="logo">AI STREAM</div>

<div class="nav-links">

<a href="/">Home</a>
<a href="/videos">Videos</a>

</div>

</div>

<div class="container">

<h1>Your Downloads</h1>

{% for video in videos %}

<div class="card">

<h2>{{ video.title }}</h2>

<video controls>

<source
src="{{ url_for('static', filename='uploads/' + video.filename) }}"
type="video/mp4"
>

</video>

</div>

{% endfor %}

</div>

</body>

</html>
