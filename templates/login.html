<!DOCTYPE html>
<html>

<head>

<title>AI STREAM Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:
linear-gradient(
to top,
rgba(0,0,0,0.8),
rgba(0,0,0,0.5)
),

url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');

background-size:cover;
background-position:center;

height:100vh;

display:flex;
justify-content:center;
align-items:center;
}

.login-box{

width:450px;

background:
rgba(0,0,0,0.85);

padding:40px;

border-radius:25px;

box-shadow:
0 0 35px rgba(255,0,0,0.25);
}

.logo{

color:red;

font-size:38px;

font-weight:bold;

margin-bottom:25px;

text-align:center;
}

input,
select{

width:100%;

padding:15px;

margin-bottom:18px;

border:none;

border-radius:12px;

background:#222;

color:white;

font-size:16px;
}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:red;

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;
}

button:hover{

background:#ff2d2d;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

AI STREAM

</div>

<form method="POST">

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="text"
name="phone"
placeholder="Phone Number"
required>

<select name="state">

<option>Andhra Pradesh</option>
<option>Telangana</option>
<option>Tamil Nadu</option>
<option>Kerala</option>
<option>Karnataka</option>
<option>Maharashtra</option>
<option>Delhi</option>

</select>

<button type="submit">

Login

</button>

</form>

</div>

</body>

</html>
